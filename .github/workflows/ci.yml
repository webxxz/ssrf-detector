name: CI

on:
  push:
    branches:
      - main
      - master
      - 'copilot/**'
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.57.2
          args: ./...

      - name: Build
        run: make build

      - name: Test
        run: make test
